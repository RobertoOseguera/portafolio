<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - NEXTMOVIE by BytePhantom</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <h1>NEXTMOVIE</h1>
            <p>by BytePhantom</p>
            <form id="loginFormFull">
                <h2>Iniciar Sesión</h2>
                <input type="email" id="emailFull" placeholder="Correo electrónico" required>
                <input type="password" id="passwordFull" placeholder="Contraseña" required>
                <button type="submit">Iniciar Sesión</button>
            </form>
            <p class="credentials">Prueba: <strong>bytephantom@hack.com</strong> / <strong>hacker</strong></p>
            <div class="login-links">
                <a href="index.html">← Volver al Home</a>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginFormFull').onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('emailFull').value;
            const pass = document.getElementById('passwordFull').value;
            if (email === 'bytephantom@hack.com' && pass === 'hacker') {
                localStorage.setItem('nextmovie_currentProfile', 'bytephantom');
                window.location.href = 'index.html';
            } else {
                alert('¡Credenciales inválidas! Usa bytephantom@hack.com / hacker');
            }
        };
    </script>
</body>
</html>
